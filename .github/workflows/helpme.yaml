name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# TODO#0: กำหนดสิทธิ์ให้ Scanner สามารถอ่านโค้ดและส่งผลขึ้นหน้า Security ได้
permissions:
  contents: read
  id-token: write           # TODO#0c
  issues: write             # TODO#0b
  pull-requests: write      # TODO#0b
  security-events: write    # TODO#0a (สำคัญมากเพื่อใช้ upload SARIF)
  actions: read

jobs:
    # GATE#0: Secret scanning
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0 # TODO#1: ต้องเป็น 0 เพื่อให้สแกนประวัติย้อนหลังได้ทั้งหมด

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true 
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}
                head: HEAD # TODO#2
                extra_args: --only-verified # TODO#3: รายงานเฉพาะ Key ที่ใช้ได้จริง

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2 # TODO#4
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    # GATE#1a: SAST via SonarQube 
    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning 
        if: ${{ !cancelled() }} 
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0 # TODO#5: Sonar ต้องการประวัติเพื่อทำ Git Blame

            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v3 # TODO#6
              continue-on-error: true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # GATE#1b: SAST via CodeQL
    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }} 
        strategy:
            matrix:
                language: [ 'javascript-typescript' ] # TODO#7: โปรเจกต์นี้เป็น React/Next.js
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                queries: security-extended,security-and-quality # TODO#8

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3 # TODO#9
              with:
                category: "/language:${{ matrix.language }}"

    # GATE#2: Dependency scanning via OWASP Dependency-Check
    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node 20
              uses: actions/setup-node@v4 # TODO#10
              with:
                node-version: 20

            - name: Install dependencies
              run: npm install # TODO#11

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.' 
                format: 'SARIF' # TODO#12: เพื่อให้โชว์ใน GitHub Security tab
                out: 'reports'
                args: >
                    --failOnCVSS 7.0
                    --enableRetired 
                    # TODO#13: Fail ถ้าเจอความเสี่ยงระดับ High (7.0+)

            - name: Upload Depcheck SARIF to Security tab
              if: always() 
              uses: github/codeql-action/upload-sarif@v3 # TODO#14
              with:
                  sarif_file: reports/dependency-check-report.sarif
                  category: dependency-check

            - name: Upload Depcheck HTML report
              if: always() 
              uses: actions/upload-artifact@v4 # TODO#15
              with:
                name: depcheck-report
                path: reports/

    # GATE#3: Container/Image scanning via Trivy
    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t my-app:latest . # TODO#16

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif' # TODO#17
                output: 'trivy-results.sarif'
                severity: 'HIGH,CRITICAL' # TODO#18
                ignore-unfixed: true # TODO#19

            - name: Upload Trivy SARIF
              if: always()
              uses: github/codeql-action/upload-sarif@v3 # TODO#20
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            - name: Upload Trivy Artifact
              if: always()
              uses: actions/upload-artifact@v4 # TODO#21
              with:
                name: trivy-results
                path: trivy-results.sarif