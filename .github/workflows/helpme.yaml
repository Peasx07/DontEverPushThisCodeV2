name: DevSecOps Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  id-token: write           # TODO#0c: สำหรับ OIDC เพื่อยืนยันตัวตนกับ Cloud
  issues: write             # TODO#0b: ให้ Bot เขียนคอมเมนต์แจ้งเตือนใน Issues ได้
  pull-requests: write      # TODO#0b: ให้ Bot เขียนคอมเมนต์แจ้งเตือนใน PR ได้
  security-events: write    # TODO#0a: สำคัญมาก! เพื่อให้ส่งไฟล์ SARIF ขึ้นไปโชว์ในแท็บ Security ของ GitHub
  actions: read

jobs:
    # GATE#0: Secret scanning (TruffleHog + Gitleaks)
    secret-scanning:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0 # TODO#1: ต้องดึง History ทั้งหมด เพราะแฮกเกอร์มักหา Secret ที่เคยหลุดใน Commit เก่าๆ

            - name: Run TruffleHog
              uses: trufflesecurity/trufflehog@main
              continue-on-error: true 
              with:
                path: ./
                base: ${{ github.event.repository.default_branch }}
                head: HEAD # TODO#2: ตรวจสอบความแตกต่างระหว่าง Branch ปัจจุบันกับตัวหลัก
                extra_args: --only-verified # TODO#3: รายงานเฉพาะ Key ที่ใช้งานได้จริง (ลด False Positive)

            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2 # TODO#4: ใช้สแกนหา Pattern ความลับที่อาจไม่ใช่ Key (เช่น Password หลุด)
              continue-on-error: true
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
                GITLEAKS_ENABLE_SUMMARY: true

    # GATE#1a: SAST via SonarQube 
    sast-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning 
        if: ${{ !cancelled() }} 
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0 # TODO#5: SonarCloud ต้องใช้ประวัติเพื่อดูว่าใครเป็นคนเขียนโค้ดบรรทัดที่พลาด (Git Blame)

            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@v3 # TODO#6: สแกนคุณภาพโค้ดและ Logic ช่องโหว่
              continue-on-error: true
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    # GATE#1b: SAST via CodeQL
    codeql-scan:
        runs-on: ubuntu-latest
        needs: secret-scanning
        if: ${{ !cancelled() }} 
        strategy:
            matrix:
                language: [ 'javascript-typescript' ] # TODO#7: โปรเจกต์นี้ใช้ React/Next.js จึงต้องสแกน JS/TS
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                languages: ${{ matrix.language }}
                queries: security-extended,security-and-quality # TODO#8: ใช้ทั้งชุดความปลอดภัยและคุณภาพโค้ด

            - name: Perform CodeQL Analysis
              uses: github/codeql-action/analyze@v3 # TODO#9: สั่งวิเคราะห์และส่งผลไปหน้า Security Tab
              with:
                category: "/language:${{ matrix.language }}"

    # GATE#2: Dependency scanning via OWASP Dependency-Check
    dependency-scanning:
        runs-on: ubuntu-latest
        needs: [sast-scan, secret-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4 # TODO#10
              with:
                node-version: 20

            - name: Install dependencies
              run: npm install # TODO#11: ต้อง Install ก่อนเพื่อให้เครื่องมือเห็นโครงสร้าง Lib ทั้งหมด

            - name: Depcheck
              uses: dependency-check/Dependency-Check_Action@main
              continue-on-error: true
              id: Depcheck
              with:
                project: 'DontEverPushThisCodeV2'
                path: '.' 
                format: 'SARIF' # TODO#12: format นี้ GitHub ถึงจะอ่านไปโชว์ในแท็บ Security ได้
                out: 'reports'
                args: >
                    --failOnCVSS 7 
                    --enableRetired 
                    # TODO#13: ตั้งให้ Fail ถ้าเจอความเสี่ยงระดับ High (CVSS >= 7)

            - name: Upload Depcheck SARIF to Security tab
              if: always() 
              uses: github/codeql-action/upload-sarif@v3 # TODO#14
              with:
                  sarif_file: reports/dependency-check-report.sarif
                  category: dependency-check

            - name: Upload Depcheck HTML report
              if: always() 
              uses: actions/upload-artifact@v4 # TODO#15: เก็บรายงานแบบสวยๆ ไว้ดูแยกต่างหาก
              with:
                name: depcheck-report
                path: reports/

    # GATE#3: Container/Image scanning via Trivy
    image-scanning:
        runs-on: ubuntu-latest
        needs: [dependency-scanning]
        if: ${{ !cancelled() }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker image
              run: docker build -t my-app:latest . # TODO#16

            - name: Trivy Scan
              uses: aquasecurity/trivy-action@master
              continue-on-error: true
              with:
                image-ref: 'my-app:latest'
                format: 'sarif' # TODO#17
                output: 'trivy-results.sarif'
                severity: 'HIGH,CRITICAL' # TODO#18: สนใจเฉพาะตัวที่อันตรายรุนแรง
                ignore-unfixed: true # TODO#19: ข้ามตัวที่ยังไม่มี Patch แก้ไข (เพื่อลดงาน Developer)

            - name: Upload Trivy SARIF
              if: always()
              uses: github/codeql-action/upload-sarif@v3 # TODO#20
              with:
                sarif_file: trivy-results.sarif
                category: trivy

            - name: Upload Trivy Artifact
              if: always()
              uses: actions/upload-artifact@v4 # TODO#21
              with:
                name: trivy-results
                path: trivy-results.sarif